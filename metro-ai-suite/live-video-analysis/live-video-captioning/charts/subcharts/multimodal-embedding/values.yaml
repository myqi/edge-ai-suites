# multimodal-embedding/values.yaml - Values for multimodal-embedding sub-chart

# Override the generated fullname. Set to "multimodal-embedding" in parent values.yaml
# so that other subcharts can reliably reference the service by this name.
# Type: string
fullnameOverride: ""

global:
  # Set this value to hostPath where we want to mount a volume (Used in single node cluster or standalone sub-chart installation).
  volumeHostPath: ""

  # usePvc should be set to true to use a PVC for persisting models, cache and other files.
  usePvc: false

  # keepPvc should be set to true to retain the PVC after uninstalling the chart.
  keepPvc: false

  # sharedPvcName is the PVC shared by VDMS Dataprep and Multimodel-Embedding-MS subcharts.
  sharedPvcName: ""

  # embedding model used in the service
  embeddingModel:
    modelId: "QwenText/qwen3-embedding-0.6b"
    useGPU:
      enabled: false
      key: "" # GPU resource key for your cluster, e.g. "gpu.intel.com/i95" or "gpu.intel.com/xe"

  noProxy: ""
  httpProxy: ""
  httpsProxy: ""

replicaCount: 1

image:
  # Type: string
  repository: intel/multimodal-embedding-serving
  # Type: string - pinned for reproducibility
  tag: "2026.1.0"
  # Type: string  [Always | IfNotPresent | Never]
  pullPolicy: IfNotPresent

service:
  # Type: string  [ClusterIP | NodePort | LoadBalancer]
  type: ClusterIP
  # VDMS listener port.
  # Type: integer
  port: 8000  # Port on which service listens for incoming connection, if exposed externally
  portName: http
  containerPort: 8000  # Port on which container application listens internally
  containerPortName: mm-embed

env:
  embeddingDevice: "CPU"
  embeddingUseOV: true
  embeddingOVModelsDir: "/app/ov_models"
  defaultStartOffsetSec: 0
  defaultClipDuration: -1
  defaultNumFrames: 64
  ovPerformanceMode: "THROUGHPUT"

resources: {}

modelPvc:
  enabled: true
  existingClaim: ""
  storageClassName: ""
  accessModes:
    - ReadWriteOnce
  size: "10Gi"

podAnnotations: {}
podLabels: {}

podSecurityContext: {}
securityContext:
  capabilities:
    drop:
      - ALL
  readOnlyRootFilesystem: true
  allowPrivilegeEscalation: false
  runAsNonRoot: false
  runAsUser: 0
  seccompProfile:
    type: RuntimeDefault

livenessProbe:
  httpGet:
    path: /health
    port: mm-embed
  initialDelaySeconds: 10
  periodSeconds: 20
  failureThreshold: 3

readinessProbe:
  httpGet:
    path: /health
    port: mm-embed
  initialDelaySeconds: 5
  periodSeconds: 10
  failureThreshold: 6

# Wait for startup till max ~ 30Mins
startupProbe:
  httpGet:
    path: /health
    port: mm-embed
  initialDelaySeconds: 10
  periodSeconds: 10
  failureThreshold: 180

nodeSelector: {}

tolerations: []
