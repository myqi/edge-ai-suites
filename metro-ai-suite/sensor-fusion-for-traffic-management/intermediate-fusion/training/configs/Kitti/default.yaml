dataset_type: V2XDataset
dataset_root: data/kitti-v2x
dataset_kitti_root: data/kitti-v2x/training/label_2
result_root: outputs

point_cloud_range: [0, -40.0, -5, 80.0, 40.0, 3]
voxel_size: [0.1, 0.1, 0.2]
image_size: [384, 1280]

object_classes:
  - car
  - truck
  - construction_vehicle
  - bus
  - trailer
  - barrier
  - motorcycle
  - bicycle
  - pedestrian
  - traffic_cone

data:
  samples_per_gpu: 4
  workers_per_gpu: 4
  train:
    type: V2XDataset
    dataset:
      dataset_root: ${dataset_root}
      dataset_kitti_root: ${dataset_kitti_root}
      result_root: ${result_root}
      ann_file: ${dataset_root + "/kitti_infos_train.pkl"}
      final_dim:  ${image_size}
      object_classes: ${object_classes}
      H: 375
      W: 1242
      is_train: true
      use_cbgs: false
      num_sweeps: 1
      img_mean: [123.675, 116.28, 103.53]
      img_std: [58.395, 57.12, 57.375]
      to_rgb: true
      return_depth: false
  val:
    type: ${dataset_type}
    dataset:
      dataset_root: ${dataset_root}
      dataset_kitti_root: ${dataset_kitti_root}
      result_root: ${result_root}
      ann_file: ${dataset_root + "/kitti_infos_val.pkl"}
      final_dim:  ${image_size}
      object_classes: ${object_classes}
      H: 375
      W: 1242
      is_train: false
      use_cbgs: false
      num_sweeps: 1
      img_mean: [123.675, 116.28, 103.53]
      img_std: [58.395, 57.12, 57.375]
      to_rgb: true
      return_depth: false

  test:
    type: ${dataset_type}
    dataset:
      dataset_root: ${dataset_root}
      dataset_kitti_root: ${dataset_kitti_root}
      result_root: ${result_root}
      ann_file: ${dataset_root + "/kitti_infos_val.pkl"}
      final_dim:  ${image_size}
      object_classes: ${object_classes}
      H: 375
      W: 1242
      is_train: false
      use_cbgs: false
      num_sweeps: 1
      img_mean: [123.675, 116.28, 103.53]
      img_std: [58.395, 57.12, 57.375]
      to_rgb: true
      return_depth: false

evaluation:
  interval: 100
  
